# Auto-publish @voidly/pay-mcp to the Anthropic MCP Registry whenever
# pay-mcp/server.json changes on main. Uses GitHub OIDC so no manual
# token rotation is needed.
name: Publish pay-mcp to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - "pay-mcp/server.json"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH=amd64 ;;
            aarch64|arm64) ARCH=arm64 ;;
          esac
          TARBALL="mcp-publisher_${OS}_${ARCH}.tar.gz"
          echo "Downloading $TARBALL"
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/${TARBALL}" | tar -xz
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help | head -5
      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc
      - name: Validate server.json
        working-directory: pay-mcp
        run: mcp-publisher validate
      - name: Publish
        working-directory: pay-mcp
        run: mcp-publisher publish
