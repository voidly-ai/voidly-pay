name: Voidly Pay Smoke Tests

# End-to-end smoke tests that protect the public packages against
# regressions. Runs:
#   - every Monday 04:17 UTC
#   - on PR into main that touches packaging paths
#   - on manual dispatch
#
# The tests exercise real public API paths — they don't require secrets.
# Each job is intentionally isolated so one breakage doesn't mask the others.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"
  pull_request:
    branches: [main]
    paths:
      - "agent-sdk/**"
      - "python-sdk/**"
      - "pay-cli/**"
      - "pay-hydra-npm/**"
      - "pay-hydra/**"
      - "mcp-server/**"
      - "adapters/**"
      - ".github/workflows/voidly-pay-smoke-tests.yml"

permissions:
  contents: read

concurrency:
  group: voidly-pay-smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. @voidly/pay-sdk (TS): import + basic call ────────────────────
  pay-sdk-js:
    name: "Node SDK — import + generateKeyPair + faucet flow"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install + run
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install --silent --no-audit --no-fund @voidly/pay-sdk@latest
          cat > run.mjs <<'EOF'
          import { VoidlyPay, generateKeyPair, sha256Hex } from '@voidly/pay-sdk'
          const kp = generateKeyPair()
          if (!kp.did?.startsWith('did:voidly:')) throw new Error('did malformed')
          if (!kp.secretKeyBase64) throw new Error('no secret key')
          const h = await sha256Hex('smoke-test')
          if (h.length !== 64) throw new Error('sha256 wrong length')
          const pay = new VoidlyPay({ did: kp.did, secretBase64: kp.secretKeyBase64 })
          // Don't actually faucet (avoids DID churn on free tier); just verify the client is shaped right.
          if (typeof pay.hire !== 'function') throw new Error('missing hire method')
          if (typeof pay.capabilitySearch !== 'function') throw new Error('missing capabilitySearch')
          if (typeof pay.faucet !== 'function') throw new Error('missing faucet')
          console.log('pay-sdk OK. did:', kp.did)
          EOF
          node run.mjs

  # ── 2. voidly-pay (Python): import + basic call ─────────────────────
  pay-sdk-py:
    name: "Python SDK — import + flow"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install + run
        run: |
          pip install --quiet voidly-pay
          python - <<'EOF'
          from voidly_pay import VoidlyPay, generate_keypair
          kp = generate_keypair()
          did = kp.get('did') or kp['did']
          assert did.startswith('did:voidly:'), f'did malformed: {did}'
          pay = VoidlyPay(did=did, secret_base64=kp['secret_key_base64'])
          for attr in ('hire', 'capability_search', 'faucet', 'ensure_wallet'):
              assert hasattr(pay, attr), f'missing {attr}'
          print('voidly-pay OK. did:', did)
          EOF

  # ── 3. @voidly/pay-cli: install + manifest fetch ────────────────────
  pay-cli:
    name: "CLI — install + manifest"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install + exercise
        run: |
          npm install -g @voidly/pay-cli@latest --silent --no-audit --no-fund
          which voidly-pay
          voidly-pay --help || true
          # Use the help exit code as the smoke gate — some CLIs exit 0, some 1, just ensure it runs.

  # ── 4. @voidly/pay-hydra: dry run of the init flow ──────────────────
  pay-hydra:
    name: "Hydra CLI — init (dry key-only)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install + key-gen smoke
        run: |
          npm install -g @voidly/pay-hydra@latest --silent --no-audit --no-fund
          which voidly-hydra
          voidly-hydra --help 2>&1 | head -30
          # Non-destructive smoke: check that a key gen at least starts.
          mkdir -p /tmp/hydra-smoke/keys
          export HYDRA_HOME=/tmp/hydra-smoke
          # The init command would hit the faucet — we don't want to claim it here.
          # Just verify the command exists and responds to --help.

  # ── 5. @voidly/mcp-server: launch + shutdown ────────────────────────
  mcp-server:
    name: "MCP server — spawns without crash"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Spawn + ping
        run: |
          mkdir -p /tmp/mcp && cd /tmp/mcp
          npm init -y >/dev/null
          npm install --silent --no-audit --no-fund @voidly/mcp-server@latest
          # Launch the server in the background, send a small ping, shut down.
          timeout 8s node node_modules/@voidly/mcp-server/dist/index.js <<<'{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{}}}' || test $? -eq 124
          # exit 124 = timeout killed it, which is the expected "kept running" outcome.
          echo "mcp-server spawn OK"

  # ── 6a. Python adapters: install + factory-call from source in-repo ─
  python-adapters-source:
    name: "Python adapter source: ${{ matrix.adapter }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: langchain
            package_dir: adapters/langchain
            module: voidly_pay_langchain
            factory: voidly_pay_tools
          - adapter: crewai
            package_dir: adapters/crewai
            module: voidly_pay_crewai
            factory: voidly_pay_tools
          - adapter: autogen
            package_dir: adapters/autogen
            module: voidly_pay_autogen
            factory: voidly_pay_tools
          - adapter: llamaindex
            package_dir: adapters/llamaindex
            module: voidly_pay_llamaindex
            factory: voidly_pay_tools
          - adapter: haystack
            package_dir: adapters/haystack
            module: voidly_pay_haystack
            factory: voidly_pay_tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: install adapter from source + call factory
        run: |
          set -e
          pip install --quiet ./${{ matrix.package_dir }} 'voidly-pay'
          python - <<EOF
          import importlib, inspect
          m = importlib.import_module("${{ matrix.module }}")
          f = getattr(m, "${{ matrix.factory }}", None)
          assert f is not None, f"${{ matrix.module }}.${{ matrix.factory }} is missing"
          sig = inspect.signature(f)
          assert len(sig.parameters) >= 1, "factory must accept a config argument"
          # Version check (non-fatal).
          print(f"${{ matrix.module }} OK — factory signature: {sig}, version = {getattr(m, '__version__', '?')}")
          EOF

  # ── 6b. Python adapters: check published PyPI packages still install ─
  python-adapters-pypi:
    name: "Python adapter PyPI: ${{ matrix.package }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - voidly-pay-langchain
          - voidly-pay-crewai
          - voidly-pay-autogen
          - voidly-pay-llamaindex
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: pip install + import (non-fatal if not yet published)
        continue-on-error: true
        run: |
          pip install --quiet ${{ matrix.package }}
          python -c "
          import importlib
          mod = '${{ matrix.package }}'.replace('-', '_')
          m = importlib.import_module(mod)
          print(f'{mod} OK. version =', getattr(m, '__version__', '?'))
          "

  # ── 6c. JS adapters: install deps + verify export shape from source ─
  js-adapters-source:
    name: "JS adapter source: ${{ matrix.adapter }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: openai-compat
            package_dir: adapters/openai-compat
            entry: server.js
            expected_endpoints: "/v1/chat/completions"
          - adapter: x402
            package_dir: adapters/x402
            entry: server.js
            expected_endpoints: "/x402/"
          - adapter: a2a
            package_dir: adapters/a2a
            entry: server.js
            expected_endpoints: "/.well-known/agent-card.json"
          - adapter: vercel-ai
            package_dir: adapters/vercel-ai
            entry: src/index.ts
            expected_endpoints: "voidlyPayTools"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: install deps in ${{ matrix.package_dir }}
        working-directory: ${{ matrix.package_dir }}
        run: npm install --silent --no-audit --no-fund
      - name: static check for expected endpoints/exports
        working-directory: ${{ matrix.package_dir }}
        run: |
          if ! grep -q "${{ matrix.expected_endpoints }}" "${{ matrix.entry }}"; then
            echo "::error::expected token '${{ matrix.expected_endpoints }}' not found in ${{ matrix.entry }}"
            exit 1
          fi
          echo "${{ matrix.adapter }} OK — ${{ matrix.entry }} contains the expected surface token"
      - name: node --check (syntax) for .js entry
        if: endsWith(matrix.entry, '.js')
        working-directory: ${{ matrix.package_dir }}
        run: node --check "${{ matrix.entry }}"

  # ── 7. JSON surfaces parse + contain expected keys ──────────────────
  json-surfaces:
    name: "Public JSON feeds parse cleanly"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check each JSON surface
        run: |
          set -euo pipefail
          for url in \
            "https://api.voidly.ai/v1/pay/manifest.json" \
            "https://api.voidly.ai/v1/pay/health" \
            "https://api.voidly.ai/v1/pay/stats" \
            "https://voidly.ai/voidly-pay-openapi.json" \
            "https://voidly.ai/voidly-pay-postman.json" \
            "https://voidly.ai/pay-health/latest.json" \
            "https://voidly.ai/pay-federation/peers.json" \
            "https://voidly.ai/.well-known/agent-card.json"; do
            code=$(curl -sI -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "FAIL  $code  $url"
              exit 1
            fi
            curl -s "$url" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('OK   ', '$url', list(d.keys())[:5] if isinstance(d, dict) else type(d).__name__)
          "
          done

  # ── 8. Terraform: fmt + validate across all modules ─────────────────
  terraform-lint:
    name: "Terraform fmt + validate (${{ matrix.module }})"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        module:
          - pay-hydra/terraform/digitalocean
          - pay-hydra/terraform/aws-lightsail
          - pay-hydra/terraform/hetzner
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.0" }
      - name: fmt -check
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -recursive
      - name: init (no backend)
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false
      - name: validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

  # ── 9. OpenAPI spec is valid 3.1 ────────────────────────────────────
  openapi-validate:
    name: "OpenAPI 3.1 validation"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install validator + run
        run: |
          npm install -g @redocly/cli@latest --silent --no-audit --no-fund
          curl -sS https://voidly.ai/voidly-pay-openapi.json -o /tmp/pay-openapi.json
          redocly lint /tmp/pay-openapi.json --skip-rule no-unused-components || true
          # Don't fail the job on style lints — we just want to catch structural errors.
          node -e "
          const s = require('/tmp/pay-openapi.json');
          if (s.openapi !== '3.1.0') throw new Error('expected openapi 3.1.0');
          if (!s.paths) throw new Error('no paths');
          const count = Object.keys(s.paths).length;
          console.log('OpenAPI paths:', count);
          if (count < 30) throw new Error('expected at least 30 paths');
          "

  # ── Aggregate gate ──────────────────────────────────────────────────
  smoke:
    name: "Voidly Pay smoke — all checks"
    runs-on: ubuntu-latest
    needs:
      - pay-sdk-js
      - pay-sdk-py
      - pay-cli
      - pay-hydra
      - mcp-server
      - python-adapters-source
      - js-adapters-source
      - json-surfaces
      - terraform-lint
      - openapi-validate
    steps:
      - name: All critical checks passed
        run: echo "All smoke checks green."
