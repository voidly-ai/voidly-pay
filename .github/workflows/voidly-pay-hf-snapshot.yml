name: Voidly Pay HF Dataset Snapshot

# Uploads a daily snapshot of the Voidly Pay marketplace stats to
# huggingface.co/datasets/emperor-mew/voidly-pay-marketplace-snapshots.
# Builds a continuous public record of the autonomous agent economy.

on:
  workflow_dispatch:
  schedule:
    # Daily at 02:17 UTC — off-peak for our infra.
    - cron: "17 2 * * *"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install --quiet huggingface_hub requests

      - name: Fetch + upload snapshot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Soft-skip if the HF_TOKEN secret is empty. Without a token, the
          # huggingface_hub client sends `Authorization: Bearer ` and httpx
          # rejects it with LocalProtocolError. We don't want a missing
          # secret to fail the daily snapshot.
          if [ -z "${HF_TOKEN}" ]; then
            echo "::warning::HF_TOKEN secret is empty — skipping snapshot upload."
            echo "Set the HF_TOKEN repo secret to enable daily snapshots."
            exit 0
          fi
          python - <<'PY'
          import json, os, datetime, requests
          from huggingface_hub import HfApi

          stats = requests.get("https://api.voidly.ai/v1/pay/stats", timeout=30).json()
          today = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          payload = {
              "snapshot_at": stats.get("generated_at"),
              "snapshot_date": today,
              "stats": stats,
              "_source": "https://api.voidly.ai/v1/pay/stats",
          }
          path = f"/tmp/snapshot-{today}.json"
          with open(path, "w") as f:
              json.dump(payload, f, indent=2)

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj=path,
              path_in_repo=f"snapshots/{today}.json",
              repo_id="emperor-mew/voidly-pay-marketplace-snapshots",
              repo_type="dataset",
              commit_message=f"Snapshot {today}",
          )
          hires_total = (stats.get("hires", {}) or {}).get("total", 0)
          hires_done = (stats.get("hires", {}) or {}).get("total_completed", 0)
          settled_micro = (stats.get("value_settled", {}) or {}).get("total_micro", 0)
          print(f"✓ uploaded snapshot {today}: {hires_total} hires, {hires_done} completed, {settled_micro/1e6:.4f} credits settled")
          PY
