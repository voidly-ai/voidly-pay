{{/*
StatefulSet — each Hydra pod gets a stable identity + its own PVC
(so the DID survives restarts).
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "voidly-pay-hydra.fullname" . }}
  labels:
    {{- include "voidly-pay-hydra.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "voidly-pay-hydra.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "voidly-pay-hydra.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "voidly-pay-hydra.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken | default false }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: hydra
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: VOIDLY_API
              value: {{ .Values.hydra.api | quote }}
            - name: HYDRA_HOME
              value: /data
            # HOME override avoids writes to /home/hydra when the root
            # filesystem is read-only — the writable emptyDir below is
            # mounted there.
            - name: HOME
              value: /home/hydra
            - name: HYDRA_CAPABILITY
              value: {{ .Values.hydra.capability | quote }}
            - name: HYDRA_PRICE_CREDITS
              value: {{ .Values.hydra.priceCredits | quote }}
            - name: HYDRA_SLA_HOURS
              value: {{ .Values.hydra.slaHours | quote }}
            - name: VOIDLY_HYDRA_PORT
              value: {{ .Values.hydra.port | quote }}
            {{- if .Values.hydra.externalUrl }}
            - name: HYDRA_EXTERNAL_URL
              value: {{ .Values.hydra.externalUrl | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: agent-card
              containerPort: {{ .Values.hydra.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: agent-card
            initialDelaySeconds: {{ .Values.probe.startup.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.probe.startup.periodSeconds | default 5 }}
            failureThreshold: {{ .Values.probe.startup.failureThreshold | default 30 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: agent-card
            initialDelaySeconds: {{ .Values.probe.liveness.initialDelaySeconds | default 120 }}
            periodSeconds: {{ .Values.probe.liveness.periodSeconds | default 30 }}
            failureThreshold: {{ .Values.probe.liveness.failureThreshold | default 6 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: agent-card
            initialDelaySeconds: {{ .Values.probe.readiness.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.probe.readiness.periodSeconds | default 10 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: hydra-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            # Writable $HOME for npm, Node.js userspace caches, etc.
            - name: home
              mountPath: /home/hydra
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if gt (int .Values.replicaCount) 1 }}
      # Soft anti-affinity when there's more than one replica. Hard
      # constraint would block scheduling on small clusters; soft gives
      # the scheduler a hint.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "voidly-pay-hydra.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}

{{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: hydra-data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
